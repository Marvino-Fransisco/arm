default_dirs:
  opencode:
    agents:
      - local: .opencode/agents/
      - global: ~/.config/opencode/agents/
    skills:
      - local: .opencode/skills/
      - global: ~/.config/opencode/skills/
    commands:
      - local: .opencode/commands/
      - global: ~/.config/opencode/commands/
  pi:
    skills:
      - local: .pi/skills/
      - global: ~/.pi/agent/skills/
    commands:
      - local: .pi/commands/
      - global: ~/.pi/agent/commands/
  claudecode:
    agents:
      - local: .claude/agents/
      - global: ~/.claude/agents/
    skills:
      - local: .claude/skills/
      - global: ~/.claude/skills/
    commands:
      - local: .claude/commands/
      - global: ~/.claude/commands/
    prompts:
      - local: .claude/prompts/
      - global: ~/.claude/prompts/
